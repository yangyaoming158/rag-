services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devdocs-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devdocs_rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: devdocs-rag-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-devdocs_rag}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-rag_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      RAG_JWT_SECRET: ${RAG_JWT_SECRET:-replace-with-at-least-32-random-characters}
      RAG_JWT_EXPIRATION_MINUTES: ${RAG_JWT_EXPIRATION_MINUTES:-480}
      RAG_STORAGE_ROOT: ${RAG_STORAGE_ROOT:-/app/data/files}
      RAG_AI_CHAT_PROVIDER: ${RAG_AI_CHAT_PROVIDER:-mock}
      RAG_AI_CHAT_BASE_URL: ${RAG_AI_CHAT_BASE_URL:-}
      RAG_AI_CHAT_API_KEY: ${RAG_AI_CHAT_API_KEY:-}
      RAG_AI_CHAT_MODEL: ${RAG_AI_CHAT_MODEL:-mock-chat}
      RAG_AI_EMBEDDING_PROVIDER: ${RAG_AI_EMBEDDING_PROVIDER:-mock}
      RAG_AI_EMBEDDING_BASE_URL: ${RAG_AI_EMBEDDING_BASE_URL:-}
      RAG_AI_EMBEDDING_API_KEY: ${RAG_AI_EMBEDDING_API_KEY:-}
      RAG_AI_EMBEDDING_MODEL: ${RAG_AI_EMBEDDING_MODEL:-mock-bge-m3}
      RAG_AI_EMBEDDING_DIMENSIONS: ${RAG_AI_EMBEDDING_DIMENSIONS:-1024}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data/files:/app/data/files
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
    container_name: devdocs-rag-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
